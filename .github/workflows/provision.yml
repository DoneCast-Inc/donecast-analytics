name: Provision analytics resources

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-22.04
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SCRIPT_NAME: op3-donecast
    steps:
      - name: Queue stats + consumer detail
        run: |
          set -uo pipefail
          A="$CF_ACCOUNT_ID"; H_AUTH="Authorization: Bearer $CF_API_TOKEN"; BASE="https://api.cloudflare.com/client/v4"
          api() { curl -s -X "$1" "$BASE$2" -H "$H_AUTH" -H "Content-Type: application/json"; }
          QJSON=$(api GET "/accounts/$A/queues")
          for QN in op3-donecast-queue1 op3-donecast-queue2; do
            QID=$(echo "$QJSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print(next((q['queue_id'] for q in (d.get('result') or []) if q.get('queue_name')=='$QN'),''))")
            echo "===== $QN ($QID) full object ====="
            api GET "/accounts/$A/queues/$QID" | python3 -m json.tool
          done
