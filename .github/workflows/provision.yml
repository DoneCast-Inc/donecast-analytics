name: Provision analytics resources

# Idempotently ensures the storage + ingestion backend the OP3 worker needs to
# RECORD downloads exists, and wires the queue consumers. Safe to re-run.
# Resources (bound in deploy-on-push.yml):
#   - R2 bucket  : analytics-blobs            (hits/, stats/, feed/ blobs)
#   - KV namespace: op3-config (8d26dc68...)  (monthly IP-hash keys, banlist)
#   - Queues     : op3-donecast-queue1/2      (raw-redirect ingestion + admin jobs)
# Run with cleanup_orphans=true once to remove the unused op3-donecast-blobs / -kv
# created during initial bring-up.
on:
  workflow_dispatch:
    inputs:
      cleanup_orphans:
        description: "Delete unused op3-donecast-blobs bucket + op3-donecast-kv namespace"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-22.04
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SCRIPT_NAME: op3-donecast
    steps:
      - name: Ensure queues + consumers (and optional orphan cleanup)
        run: |
          set -uo pipefail
          A="$CF_ACCOUNT_ID"; H="Authorization: Bearer $CF_API_TOKEN"; B="https://api.cloudflare.com/client/v4"
          api(){ curl -s -X "$1" "$B$2" -H "$H" -H "Content-Type: application/json" ${3:+-d "$3"}; }

          for QN in op3-donecast-queue1 op3-donecast-queue2; do
            api POST "/accounts/$A/queues" "{\"queue_name\":\"$QN\"}" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print('$QN create:',d.get('success'),d.get('errors'))"
          done
          QJSON=$(api GET "/accounts/$A/queues")
          for QN in op3-donecast-queue1 op3-donecast-queue2; do
            QID=$(echo "$QJSON" | python3 -c "import sys,json;d=json.load(sys.stdin);print(next((q['queue_id'] for q in (d.get('result') or []) if q.get('queue_name')=='$QN'),''))")
            api POST "/accounts/$A/queues/$QID/consumers" "{\"type\":\"worker\",\"script_name\":\"$SCRIPT_NAME\",\"settings\":{\"batch_size\":100,\"max_retries\":3,\"max_wait_time_ms\":5000}}" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print('$QN consumer:','OK' if d.get('success') else d.get('errors'))"
          done

          if [ "${{ inputs.cleanup_orphans }}" = "true" ]; then
            echo "=== cleanup orphans ==="
            api DELETE "/accounts/$A/r2/buckets/op3-donecast-blobs" | python3 -c "import sys,json;d=json.load(sys.stdin);print('del bucket:',d.get('success'),d.get('errors'))" || true
            ONS=$(api GET "/accounts/$A/storage/kv/namespaces?per_page=100" | python3 -c "import sys,json;d=json.load(sys.stdin);print(next((n['id'] for n in (d.get('result') or []) if n.get('title')=='op3-donecast-kv'),''))")
            [ -n "$ONS" ] && api DELETE "/accounts/$A/storage/kv/namespaces/$ONS" | python3 -c "import sys,json;d=json.load(sys.stdin);print('del kv:',d.get('success'),d.get('errors'))" || echo "no orphan kv"
          fi
